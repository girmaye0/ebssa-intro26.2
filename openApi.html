<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Breed Explorer</title>
    <link rel="stylesheet" href="css/openApi.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="openApi.html" class="active">Explore Dogs</a></li>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
    <header>
      <h1>🐶 Dog Breed Explorer! 🦮</h1>
      <p>Select a breed below to view its picture and characteristics.</p>
    </header>

    <main>
      <section class="controls-section">
        <label for="breed-select">Choose a Dog Breed:</label>
        <select id="breed-select">
          <option value="">-- Loading Breeds... --</option>
        </select>
        <button id="fetch-dog-btn">Show Details</button>
      </section>

      <section id="dog-display-section">
        <p id="error-message" class="hidden"></p>

        <div id="dog-card" class="hidden">
          <div id="image-loading" class="hidden">Loading beautiful pup...</div>
          <img id="dog-image" src="" alt="Dog Breed Visual" />
          <div class="dog-info">
            <h2 id="dog-name"></h2>
            <p><strong>Bred For:</strong> <span id="dog-purpose"></span></p>
            <p>
              <strong>Temperament:</strong> <span id="dog-temperament"></span>
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="js/openApi.js" defer></script>
    <script src="js/footer.js"></script>
  </body>
</html>
